<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b7cf7"/>
    </marker>
  </defs>
  <rect width="960" height="240" rx="14" fill="#12101c"/>

  <rect x="24" y="56" width="200" height="130" rx="12" fill="#1d1930" stroke="#3a3357"/>
  <text x="124" y="96" text-anchor="middle" font-size="30">🎮</text>
  <text x="124" y="128" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Vous jouez</text>
  <text x="124" y="150" text-anchor="middle" fill="#8f88ad" font-size="11">votre partie, en live,</text>
  <text x="124" y="166" text-anchor="middle" fill="#8f88ad" font-size="11">comme d'habitude</text>

  <line x1="232" y1="121" x2="292" y2="121" stroke="#8b7cf7" stroke-width="3" marker-end="url(#a)"/>

  <rect x="300" y="56" width="200" height="130" rx="12" fill="#1d1930" stroke="#3a3357"/>
  <text x="400" y="96" text-anchor="middle" font-size="30">💬</text>
  <text x="400" y="128" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Le chat rejoint</text>
  <text x="400" y="150" text-anchor="middle" fill="#8f88ad" font-size="11">une !commande, et le jeu</text>
  <text x="400" y="166" text-anchor="middle" fill="#8f88ad" font-size="11">se lance chez vos viewers</text>

  <line x1="508" y1="121" x2="568" y2="121" stroke="#8b7cf7" stroke-width="3" marker-end="url(#a)"/>

  <rect x="576" y="56" width="176" height="130" rx="12" fill="#241d3f" stroke="#8b7cf7" stroke-width="1.5"/>
  <text x="664" y="96" text-anchor="middle" font-size="30">🚦</text>
  <text x="664" y="128" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Départ synchro</text>
  <text x="664" y="150" text-anchor="middle" fill="#8f88ad" font-size="11">5-4-3-2-1… GO,</text>
  <text x="664" y="166" text-anchor="middle" fill="#8f88ad" font-size="11">tous en même temps</text>

  <line x1="760" y1="121" x2="812" y2="121" stroke="#8b7cf7" stroke-width="3" marker-end="url(#a)"/>

  <rect x="820" y="56" width="116" height="130" rx="12" fill="#1d1930" stroke="#3a3357"/>
  <text x="878" y="96" text-anchor="middle" font-size="30">🏆</text>
  <text x="878" y="128" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Classement</text>
  <text x="878" y="146" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">en direct</text>
  <text x="878" y="166" text-anchor="middle" fill="#8f88ad" font-size="11">sur votre overlay</text>

  <text x="480" y="220" text-anchor="middle" fill="#6f6890" font-size="12">De la manette au podium — sans quitter votre stream.</text>
