<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b7cf7"/>
    </marker>
  </defs>
  <rect width="920" height="300" rx="14" fill="#12101c"/>

  <!-- Colonne 1 : le jeu -->
  <rect x="30" y="60" width="220" height="180" rx="12" fill="#1d1930" stroke="#3a3357"/>
  <text x="140" y="46" text-anchor="middle" fill="#c9c3e8" font-size="15" font-weight="600">VOTRE PARTIE</text>
  <text x="140" y="100" text-anchor="middle" fill="#ffffff" font-size="14">💀 Vie perdue</text>
  <text x="140" y="132" text-anchor="middle" fill="#ffffff" font-size="14">👑 Boss vaincu</text>
  <text x="140" y="164" text-anchor="middle" fill="#ffffff" font-size="14">💍 Anneaux perdus</text>
  <text x="140" y="196" text-anchor="middle" fill="#ffffff" font-size="14">🏆 Record battu</text>
  <text x="140" y="226" text-anchor="middle" fill="#8f88ad" font-size="11">14 000+ jeux, 57 consoles</text>

  <!-- Fleche -->
  <line x1="258" y1="150" x2="330" y2="150" stroke="#8b7cf7" stroke-width="3" marker-end="url(#arr)"/>
  <text x="294" y="136" text-anchor="middle" fill="#8b7cf7" font-size="11">en direct</text>

  <!-- Colonne 2 : RetroCreator -->
  <rect x="338" y="60" width="220" height="180" rx="12" fill="#241d3f" stroke="#8b7cf7" stroke-width="1.5"/>
  <text x="448" y="46" text-anchor="middle" fill="#c9c3e8" font-size="15" font-weight="600">RETRO CREATOR</text>
  <text x="448" y="105" text-anchor="middle" fill="#ffffff" font-size="14">Reconnaît le moment</text>
  <text x="448" y="130" text-anchor="middle" fill="#ffffff" font-size="14">de jeu et déclenche</text>
  <text x="448" y="155" text-anchor="middle" fill="#ffffff" font-size="14">vos effets</text>
  <text x="448" y="200" text-anchor="middle" fill="#8f88ad" font-size="11">aucune configuration par jeu,</text>
  <text x="448" y="216" text-anchor="middle" fill="#8f88ad" font-size="11">aucune capture d'écran</text>

  <!-- Fleches sorties -->
  <line x1="566" y1="110" x2="638" y2="92" stroke="#8b7cf7" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="566" y1="150" x2="638" y2="150" stroke="#8b7cf7" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="566" y1="190" x2="638" y2="208" stroke="#8b7cf7" stroke-width="3" marker-end="url(#arr)"/>

  <!-- Colonne 3 : le stream -->
  <rect x="646" y="52" width="244" height="56" rx="10" fill="#1d1930" stroke="#3a3357"/>
  <text x="768" y="76" text-anchor="middle" fill="#ffffff" font-size="14">🎬 Overlays qui réagissent</text>
  <text x="768" y="96" text-anchor="middle" fill="#8f88ad" font-size="11">confettis, roulette, hype meter…</text>

  <rect x="646" y="122" width="244" height="56" rx="10" fill="#1d1930" stroke="#3a3357"/>
  <text x="768" y="146" text-anchor="middle" fill="#ffffff" font-size="14">💡 Lumières de la pièce/borne</text>
  <text x="768" y="166" text-anchor="middle" fill="#8f88ad" font-size="11">flash rouge sur un coup reçu</text>

  <rect x="646" y="192" width="244" height="56" rx="10" fill="#1d1930" stroke="#3a3357"/>
  <text x="768" y="216" text-anchor="middle" fill="#ffffff" font-size="14">🏁 Concours avec vos viewers</text>
  <text x="768" y="236" text-anchor="middle" fill="#8f88ad" font-size="11">ils jouent chez eux, classement live</text>

  <text x="460" y="282" text-anchor="middle" fill="#6f6890" font-size="11">Le jeu → votre stream. C'est tout.</text>
</svg>
